<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1200" height="630" fill="#0A0A0A"/>

  <!-- Subtle grid pattern dots -->
  <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
    <circle cx="20" cy="20" r="0.8" fill="#C9A96E" opacity="0.15"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#dots)"/>

  <!-- Large decorative ring (background) -->
  <ellipse cx="180" cy="315" rx="260" ry="170" stroke="#C9A96E" opacity="0.06" stroke-width="1"/>
  <ellipse cx="180" cy="315" rx="200" ry="130" stroke="#C9A96E" opacity="0.06" stroke-width="0.5" stroke-dasharray="4 8"/>
  <ellipse cx="180" cy="315" rx="140" ry="90"  stroke="#C9A96E" opacity="0.06" stroke-width="0.5"/>

  <!-- Right decorative ring -->
  <ellipse cx="1100" cy="315" rx="180" ry="115" stroke="#C9A96E" opacity="0.04" stroke-width="1"/>

  <!-- Left gold accent bar -->
  <rect x="80" y="260" width="1" height="110" fill="#C9A96E" opacity="0.6"/>

  <!-- Eyebrow text -->
  <text x="100" y="252" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13" font-weight="400" letter-spacing="5" fill="#C9A96E">POKHARA · NEPAL</text>

  <!-- Icon mark (inline) -->
  <ellipse cx="130" cy="315" rx="52" ry="34" stroke="#C9A96E" stroke-width="1.5"/>
  <circle cx="130" cy="315" r="19" stroke="#C9A96E" stroke-width="1.5"/>
  <circle cx="130" cy="315" r="7" fill="#C9A96E"/>
  <line x1="130" y1="275" x2="130" y2="285" stroke="#C9A96E" stroke-width="1.2"/>
  <line x1="130" y1="345" x2="130" y2="355" stroke="#C9A96E" stroke-width="1.2"/>
  <line x1="78" y1="315" x2="88" y2="315" stroke="#C9A96E" stroke-width="1.2"/>
  <line x1="172" y1="315" x2="182" y2="315" stroke="#C9A96E" stroke-width="1.2"/>

  <!-- Main wordmark -->
  <text x="200" y="336" font-family="Georgia, 'Times New Roman', serif" font-size="72" font-weight="400" letter-spacing="3" fill="#F5F3EF">Drishya</text>
  <text x="718" y="336" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="36" font-weight="300" letter-spacing="6" fill="#C9A96E">360</text>

  <!-- Horizontal divider -->
  <line x1="100" y1="372" x2="680" y2="372" stroke="#C9A96E" stroke-width="0.5" opacity="0.4"/>

  <!-- Tagline -->
  <text x="100" y="404" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="17" font-weight="300" letter-spacing="2" fill="#9A9690">Premium 360° Virtual Tours · Hospitality &amp; Real Estate</text>

  <!-- URL tag bottom right -->
  <text x="1120" y="590" text-anchor="end" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13" font-weight="300" letter-spacing="2" fill="#6B6760">drishya360.com</text>
</svg>
