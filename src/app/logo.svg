<svg width="280" height="56" viewBox="0 0 280 56" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Drishya360 logo">
  <title>Drishya360</title>
  <!-- Eye / lens mark: outer ellipse representing 360 panorama -->
  <ellipse cx="28" cy="28" rx="23" ry="15" stroke="#C9A96E" stroke-width="1"/>
  <!-- Inner iris ring -->
  <circle cx="28" cy="28" r="8" stroke="#C9A96E" stroke-width="1"/>
  <!-- Pupil dot -->
  <circle cx="28" cy="28" r="2.8" fill="#C9A96E"/>
  <!-- Cardinal tick marks (compass / 360 degrees) -->
  <line x1="28" y1="11" x2="28" y2="15.5" stroke="#C9A96E" stroke-width="0.8"/>
  <line x1="28" y1="40.5" x2="28" y2="45" stroke="#C9A96E" stroke-width="0.8"/>
  <line x1="5" y1="28" x2="9.5" y2="28" stroke="#C9A96E" stroke-width="0.8"/>
  <line x1="46.5" y1="28" x2="51" y2="28" stroke="#C9A96E" stroke-width="0.8"/>
  <!-- Wordmark: Drishya -->
  <text x="64" y="37" font-family="Georgia, 'Times New Roman', serif" font-size="28" font-weight="400" letter-spacing="1.5" fill="#F5F3EF">Drishya</text>
  <!-- Superscript-style 360 -->
  <text x="205" y="37" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" font-weight="300" letter-spacing="2.5" fill="#C9A96E">360</text>
</svg>
