<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Drishya360 icon mark">
  <title>Drishya360 Icon</title>
  <!-- Dark background -->
  <rect width="512" height="512" fill="#0A0A0A"/>
  <!-- Outer ellipse: panoramic lens / eye of the world -->
  <ellipse cx="256" cy="256" rx="210" ry="140" stroke="#C9A96E" stroke-width="8"/>
  <!-- Inner iris -->
  <circle cx="256" cy="256" r="80" stroke="#C9A96E" stroke-width="8"/>
  <!-- Pupil -->
  <circle cx="256" cy="256" r="28" fill="#C9A96E"/>
  <!-- Cardinal ticks -->
  <line x1="256" y1="100" x2="256" y2="140" stroke="#C9A96E" stroke-width="7"/>
  <line x1="256" y1="372" x2="256" y2="412" stroke="#C9A96E" stroke-width="7"/>
  <line x1="46" y1="256" x2="86" y2="256" stroke="#C9A96E" stroke-width="7"/>
  <line x1="426" y1="256" x2="466" y2="256" stroke="#C9A96E" stroke-width="7"/>
  <!-- Diagonal ticks at 45° -->
  <line x1="108" y1="148" x2="136" y2="168" stroke="#C9A96E" stroke-width="5" opacity="0.5"/>
  <line x1="376" y1="344" x2="404" y2="364" stroke="#C9A96E" stroke-width="5" opacity="0.5"/>
  <line x1="404" y1="148" x2="376" y2="168" stroke="#C9A96E" stroke-width="5" opacity="0.5"/>
  <line x1="136" y1="344" x2="108" y2="364" stroke="#C9A96E" stroke-width="5" opacity="0.5"/>
</svg>
