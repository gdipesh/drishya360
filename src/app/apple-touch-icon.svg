<svg width="180" height="180" viewBox="0 0 180 180" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- iOS rounded rect background (system clips, but fill is needed) -->
  <rect width="180" height="180" fill="#0A0A0A"/>
  <!-- Centered icon mark, larger for touch icon legibility -->
  <ellipse cx="90" cy="90" rx="72" ry="47" stroke="#C9A96E" stroke-width="3"/>
  <circle cx="90" cy="90" r="27" stroke="#C9A96E" stroke-width="3"/>
  <circle cx="90" cy="90" r="10" fill="#C9A96E"/>
  <!-- Cardinal ticks -->
  <line x1="90" y1="37" x2="90" y2="50" stroke="#C9A96E" stroke-width="2.5"/>
  <line x1="90" y1="130" x2="90" y2="143" stroke="#C9A96E" stroke-width="2.5"/>
  <line x1="18" y1="90" x2="31" y2="90" stroke="#C9A96E" stroke-width="2.5"/>
  <line x1="149" y1="90" x2="162" y2="90" stroke="#C9A96E" stroke-width="2.5"/>
  <!-- Brand name small below mark -->
  <text x="90" y="168" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="11" font-weight="400" letter-spacing="2" fill="#C9A96E">D360</text>
</svg>
